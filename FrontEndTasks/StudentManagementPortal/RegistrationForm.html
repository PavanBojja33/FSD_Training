<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registration Form</title>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid mt-2">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://img.collegepravesh.com/2021/06/CVRCE-Ibrahimpatnam-Logo.png" alt="College Logo"
                    width="60" class="me-2">
                <span class="fw-bold text-dark">Student Portal</span>
            </a>

            <ul class="navbar-nav d-flex flex-row align-items-between gap-4">

                <li class="nav-item">
                    <a class="nav-link text-dark" href="./home.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="#">Courses</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="#">Contact</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="btn btn-warning">
                        Login
                    </a>
                </li>

            </ul>

        </div>
    </nav>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <form class="card shadow p-4">
                    <h2 class="text-center mb-4">
                        Student Registration Form
                    </h2>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="text" class="form-control" placeholder="Enter your roll number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" class="form-control" placeholder="Enter your mobile number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">Gender</label>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="other">
                            <label class="form-check-label" for="other">Other</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <select class="form-select">
                            <option>Select Branch</option>
                            <option>CSE</option>
                            <option>CSBS</option>
                            <option>IT</option>
                            <option>ECE</option>
                            <option>EEE</option>
                            <option>Mechanical</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Upload Photo</label>
                        <input type="file" class="form-control" required>
                    </div>

                    <div class="mb-4 form-check">
                        <input class="form-check-input position-static" type="checkbox">
                        <label class="form-label">I agree to the Terms & Conditions</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Submit
                    </button>

                </form>

            </div>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
