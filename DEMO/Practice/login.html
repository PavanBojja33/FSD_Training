<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>

    *{
        padding:0;
        margin:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background-color:rgb(255, 255, 255);
    }

    .content{
        border:2px solid rgb(83,83,83);
        border-radius:10px;
        padding:25px;
        width:90%;
        max-width:350px;
        background:white;
    }

    h2{
        text-align:center;
        text-decoration: underline;
        margin-bottom:20px;
    }

    form{
        display:flex;
        flex-direction:column;
        gap:10px;
    }

    label{
        font-size:20px;
        font-weight: 600;
    }

    input{
        padding:8px;
        border-radius:5px;
        border:1px solid gray;
        font-size:18px;
    }

    input:focus{
        outline:none;
        border:1px solid #007BFF;
    }

    button{
        margin-top:10px;
        padding:10px;
        border:none;
        background:#007BFF;
        color:white;
        border-radius:5px;
        cursor:pointer;
        font-size:21px;
    }

    button:hover{
        background:#63adfc;
    }

    .forgot{
        text-align:center;
        margin-top:10px;
        font-size:20px;
    }

    .forgot a{
        text-decoration:none;
        color:#007BFF;
    }

</style>
</head>
<body>
    <div class="content">
        <h2>Login</h2>
        <form>
            <label for="username">Username</label>
           <input type="text" id="username" placeholder="Enter username" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>
        </form>
    </div>
</body>
</html>
