<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100vh;
            background: linear-gradient(200deg, #084c5f, #f0efef);
        }

        .login-card{
            width: 400px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }
        .login-card h1{
            text-align: center;
            margin-bottom: 20px;
        }
        @keyframes fadeInUp{
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
        .sub{
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        .sub label{
            margin-bottom: 5px;
        }
        .sub input{
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .login-button{
            width: 100%;
            padding: 10px;
            background-color: #084c5f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .login-button:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Welcome Back</h1>
        <form>
            <div class="sub">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="sub">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-button">Login</button>
        </form>
    </div>
</body>
</html>
