<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5</title>
</head>
<style>
    .div{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
    }
    button{
        width: 150px;
        height: 40px;
        border: 0px;
        border-radius: 5px;
        background-color: rgb(49, 49, 211);
        color: white;
    }
    button:hover{
        color: rgb(52, 51, 51);
        background-color: rgba(30, 214, 110, 0.5);
        transform: scale(1.1);
    }
</style>
<body>
    <div class="div">
        <button>Click Me</button>   
    </div>
