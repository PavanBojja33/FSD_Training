<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }

    .nav{
        width: 100%;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-around;
        background-color: rgb(26, 26, 26);
    }
    .nav a{
        color: white;
        text-decoration: none;
        font-size: 20px;
        padding: 10px;
    }

    a:hover{
        transition: all 0.5s ease-out;
        color: aquamarine;
        font-size: 25px;
        text-decoration: underline;    
    }
</style>
<body>
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>

    </div>
</body>
</html>
