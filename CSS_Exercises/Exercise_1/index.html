<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
</head>
<style>
    nav{
        width: 100%;
        height: 100vh;
        display: flex;
        align-items:flex-start;
        justify-content: space-around;
    }
    nav a{
        background-color: #f0f0f0;
        padding: 10px 20px;
        text-decoration: none;
        color: #141111;
    }
    @media screen AND (max-width : 768px){
        nav{
            /* display: flex; */
            flex-direction: column;
            align-items: center;
            /* justify-content: center; */
        }
    }
    @media screen AND (min-width : 769px){
        nav{
            /* display: flex; */
            flex-direction: row;
            /* align-items: center;
            justify-content: center; */
        }
    }
</style>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</body>
</html>
