<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }

    .container{
        width: fit-content;
        height: fit-content;
        background-color: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius:10px ;
        position: absolute;
        top: 100px;
        left: 45%;
    }
    .circle{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin: 5px;
    }
    #c1{
        background-color: red;
        animation: red 6s linear infinite ;
    }
    #c2{
        background-color: yellow;
        animation: yellow 6s linear 2s infinite ;
    }
    #c3{
        background-color: green;
        animation: green 6s linear 4s infinite ;
    }
    @keyframes red{
        0%,33.33%{
            opacity: 1;
        }
        33.34%,100%{
            opacity: 0.2;
        }
    }
    @keyframes yellow{
        0%,33.33%{
            opacity: 1;
        }
        33.34%,100%{
            opacity: 0.2;
        }
    }
    @keyframes green{
        0%,33.33%{
            opacity: 1;
        }
        33.34%,100%{
            opacity: 0.2;
        }
    }
</style>
<body>
    <div class="container">
        <div class="circle" id="c1"></div>
        <div class="circle" id="c2"></div>
        <div class="circle" id="c3"></div>
    </div>
</body>
</html>
