<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }
    .class{
        display: flex;
        align-items: center;
        justify-content: center;

    }
    img{
        width: 600px;
        height: 800px;
        object-fit:contain;
        margin-top: 100px;
    }
    img:hover{
        transform: scale(1.2);
        transition: all 0.5s ease;
    }
</style>
<body>
    <div class="class">
        <img src="https://i.pinimg.com/1200x/96/47/67/964767deee7e5f1e48966144fa807977.jpg" alt="image">
    </div>
</body>
</html>
