<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(135deg, #eef2ff, #dbeafe);
        }

        .box {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 28px 22px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .box h2 {
            margin-bottom: 18px;
            color: #0f172a;
            font-size: 22px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            margin-top: 6px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #6e96eb;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login Form</h2>

        <form action="get" id="loginForm">
            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required />
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        // Very basic validation: block submit if fields are empty.
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        form.addEventListener('submit', (e) => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username) {
                e.preventDefault();
                alert('Enter username');
                usernameInput.focus();
                return;
            }

            if (!password) {
                e.preventDefault();
                alert('Enter password');
                passwordInput.focus();
                return;
            }
        });
    </script>
</body>
</html>
